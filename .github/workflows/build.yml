name: Build Project Chimera

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-addon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Headless Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender

      - name: Render Procedural Textures
        run: blender -b -P scripts/generate_blender_textures.py

      - name: Package Add-on Files
        run: |
          cd behavior_pack
          zip -r ../Chimera_BP.mcpack *
          cd ..
          
          cd resource_pack
          zip -r ../Chimera_RP.mcpack *
          cd ..
          
          zip -j Chimera_v1.2.mcaddon Chimera_BP.mcpack Chimera_RP.mcpack

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chimera-Addon
          path: Chimera_v1.2.mcaddon
