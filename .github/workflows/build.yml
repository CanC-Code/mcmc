name: Build Project Chimera

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-addon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # This runs before zipping so the generated .geo.json is included
      - name: Generate Procedural Geometry
        run: python scripts/generate_tree.py

      - name: Package Add-on Files
        run: |
          # Compress the Behavior Pack
          cd behavior_pack
          zip -r ../Chimera_BP.mcpack *
          cd ..
          
          # Compress the Resource Pack
          cd resource_pack
          zip -r ../Chimera_RP.mcpack *
          cd ..
          
          # Combine into the final .mcaddon
          zip -j Chimera_v0.1.mcaddon Chimera_BP.mcpack Chimera_RP.mcpack

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chimera-Addon
          path: Chimera_v0.1.mcaddon
