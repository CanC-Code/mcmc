name: Build Project Chimera

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-addon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Image Library
        run: pip install Pillow numpy

      - name: Generate Safe Assets & Features
        run: python scripts/generate_textures.py

      - name: Package Add-on Files
        run: |
          cd behavior_pack
          zip -r ../Chimera_BP.mcpack *
          cd ..
          
          cd resource_pack
          zip -r ../Chimera_RP.mcpack *
          cd ..
          
          zip -j Chimera_v1.4.mcaddon Chimera_BP.mcpack Chimera_RP.mcpack

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chimera-Addon
          path: Chimera_v1.4.mcaddon
